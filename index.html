<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Calculador de combustível - Saiba qual combustível é mais econômico" />
    <title>Cálculo de Combustível</title>

    <link rel="shortcut icon" href="src/favicon/index/favicon.ico" type="image/x-icon" />

    <!-- styles -->
    <link rel="stylesheet" href="src/css/reset.css" />
    <link rel="stylesheet" href="src/css/style.css" />

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Afacad+Flux:wght@100..1000&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main>
      <div class="container">
        <div class="title">
          <a href="about.html">
            <h2>Cálculo de Combustível</h2>
          </a>
        </div>

        <div class="texto">
          <p>
            Por gentileza, coloque abaixo o valor do Etanol e o Valor da
            Gasolina e em seguida clique em Calcular.
          </p>
          <p>
            <small>(Obs.: Para Calcular novamente, preencha os valores novamente e
            clique em CALCULAR, ou clique no botão ZERAR)</small>
          </p>
        </div>

        <form class="combustiveis" id="formulario">
          <div class="campo">
            <label for="etanol">Valor do Etanol (R$):</label>
            <input
              type="number"
              id="etanol"
              class="input"
              step="0.01"
              min="0"
              placeholder="0.00"
              required
            />
            <span class="erro" id="erroEtanol"></span>
          </div>

          <div class="campo">
            <label for="autonomiaEtanol">Autonomia Etanol (Km/L):</label>
            <input
              type="number"
              id="autonomiaEtanol"
              class="input"
              step="0.1"
              min="0"
              placeholder="0.0"
              required
            />
            <span class="erro" id="erroAutonomiaEtanol"></span>
          </div>

          <div class="campo">
            <label for="gasolina">Valor da Gasolina (R$):</label>
            <input
              type="number"
              id="gasolina"
              class="input"
              step="0.01"
              min="0"
              placeholder="0.00"
              required
            />
            <span class="erro" id="erroGasolina"></span>
          </div>

          <div class="campo">
            <label for="autonomiaGasolina">Autonomia Gasolina (Km/L):</label>
            <input
              type="number"
              id="autonomiaGasolina"
              class="input"
              step="0.1"
              min="0"
              placeholder="0.0"
              required
            />
            <span class="erro" id="erroAutonomiaGasolina"></span>
          </div>
        </form>

        <div id="resultado" class="resultado"></div>

        <div class="buttons">
          <button
            class="buttonCalculate"
            type="button"
            id="btnCalculate"
          >
            CALCULAR
          </button>
          <button type="button" id="btnZerar" class="buttonZerar">ZERAR</button>
        </div>
      </div>
    </main>

    <script defer src="src/js/script.js"></script>
  </body>
</html>
